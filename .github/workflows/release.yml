name: release

# Manual release: bumps the version, commits + tags + pushes + creates a
# GitHub release, then publishes to the Homey App Store. Requires:
# - HOMEY secret containing a Personal Access Token from
#   https://tools.developer.homey.app/me (Personal Access Tokens tab).

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: Semver bump
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
      changelog:
        description: Changelog (one short line, English, user-facing)
        type: string
        required: true
        default: Maintenance release.

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Validate Homey app (level=verified)
        uses: athombv/github-action-homey-app-validate@master
        with:
          level: verified

      - name: Bump version
        id: bump
        uses: athombv/github-action-homey-app-version@master
        with:
          version: ${{ github.event.inputs.version_type }}
          changelog: ${{ github.event.inputs.changelog }}

      - name: Commit, tag, push, create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD --tags
          gh release create "v${{ steps.bump.outputs.version }}" \
            -t "v${{ steps.bump.outputs.version }}" \
            --notes "${{ github.event.inputs.changelog }}" \
            --generate-notes

      - name: Publish to Homey App Store
        id: publish
        uses: athombv/github-action-homey-app-publish@master
        with:
          personal_access_token: ${{ secrets.HOMEY }}

      - name: Surface manage-URL in run summary
        run: |
          echo "Manage your app release at ${{ steps.publish.outputs.url }}" >> $GITHUB_STEP_SUMMARY
