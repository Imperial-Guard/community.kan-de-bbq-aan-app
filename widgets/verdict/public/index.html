<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    /* Defaults at :root so widget renders something visible BEFORE JS sets a status class */
    :root {
      --card-bg: linear-gradient(135deg, #FFF4D1 0%, #FFE29F 55%, #F5C061 100%);
      --fg: #5C3D05;
      --fg-muted: rgba(92, 61, 5, 0.72);
      --border: rgba(92, 61, 5, 0.22);
      --chip-bg: rgba(92, 61, 5, 0.14);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      padding: 0;
      font-family: var(--homey-font-family-regular, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif);
      overflow: hidden;
      color: var(--fg, #5C3D05);
      background: var(--card-bg, #FFE29F);
      transition: background 0.5s ease, color 0.5s ease;
    }

    .card {
      position: relative;
      height: 100%;
      padding: 10px 14px 10px 8px;
      display: grid;
      grid-template-columns: 128px 1fr;
      grid-template-rows: 1fr auto;
      column-gap: 10px;
      align-items: center;
      overflow: hidden;
    }

    /* Verkeerslicht-palet: groen is doen, amber is twijfel, rood is niet doen. */
    body.yes {
      --card-bg: linear-gradient(135deg, #D4E8B5 0%, #A5D46A 55%, #6FB528 100%);
      --fg: #1E3A0A;
      --fg-muted: rgba(30, 58, 10, 0.72);
      --border: rgba(30, 58, 10, 0.22);
      --chip-bg: rgba(30, 58, 10, 0.16);
    }
    body.maybe {
      --card-bg: linear-gradient(135deg, #FFF4D1 0%, #FFE29F 55%, #F5C061 100%);
      --fg: #5C3D05;
      --fg-muted: rgba(92, 61, 5, 0.72);
      --border: rgba(92, 61, 5, 0.22);
      --chip-bg: rgba(92, 61, 5, 0.14);
    }
    body.no {
      --card-bg: linear-gradient(135deg, #F8D5CD 0%, #E89B8B 55%, #C4624F 100%);
      --fg: #5A1E0E;
      --fg-muted: rgba(90, 30, 14, 0.72);
      --border: rgba(90, 30, 14, 0.22);
      --chip-bg: rgba(90, 30, 14, 0.16);
    }

    /* ===== Layered scene: weather glyph (top-left) + kettle (base) + flame (over grate) ===== */
    .scene {
      grid-row: 1 / span 2;
      position: relative;
      width: 128px;
      height: 128px;
      align-self: center;
    }
    .scene img {
      position: absolute;
      display: block;
      user-select: none;
      pointer-events: none;
    }
    .scene .kettle {
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .scene .weather {
      top: -2%;
      left: -2%;
      width: 32%;
      height: 32%;
      opacity: 0.95;
      transition: opacity 0.4s ease;
    }
    /* Outer wrapper handelt score-gedreven base-scale af; inner img doet de flicker animatie */
    .scene .flame-wrap {
      position: absolute;
      top: 14%;
      left: 18%;
      width: 36%;
      height: 36%;
      opacity: 0;
      transform: scale(var(--flame-scale, 1));
      transform-origin: 50% 100%;
      transition: opacity 0.5s ease, transform 0.7s cubic-bezier(.34,1.4,.6,1);
    }
    .scene .flame {
      width: 100%;
      height: 100%;
      transform-origin: 50% 100%;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.18));
    }

    /* Status-driven flame: yes = full + flicker, maybe = dim + sway, no = hidden */
    body.yes   .scene .flame-wrap { opacity: 1; }
    body.maybe .scene .flame-wrap { opacity: 0.55; }
    body.no    .scene .flame-wrap { opacity: 0; }
    body.yes   .scene .flame { animation: flicker 2.4s ease-in-out infinite; }
    body.maybe .scene .flame { animation: sway 3.2s ease-in-out infinite; }

    @keyframes flicker {
      0%, 100% { transform: scale(1, 1)    translateY(0);    filter: brightness(1)    drop-shadow(0 1px 1px rgba(0,0,0,0.18)); }
      25%      { transform: scale(1.04, 1.07) translateY(-0.5px); filter: brightness(1.08) drop-shadow(0 1px 2px rgba(238,107,57,0.4)); }
      50%      { transform: scale(0.96, 0.94) translateY(0.3px);  filter: brightness(0.95) drop-shadow(0 1px 1px rgba(0,0,0,0.18)); }
      75%      { transform: scale(1.02, 1.05) translateY(-0.2px); filter: brightness(1.04) drop-shadow(0 1px 2px rgba(238,107,57,0.3)); }
    }
    @keyframes sway {
      0%, 100% { transform: translateX(0)    rotate(0deg); }
      50%      { transform: translateX(1px)  rotate(-2deg); }
    }

    .content {
      display: flex;
      flex-direction: column;
      gap: 0;
      min-width: 0;
    }
    .verdict {
      font-size: 38px;
      font-weight: 800;
      line-height: 0.92;
      letter-spacing: -0.04em;
    }
    .advice {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.25;
      color: var(--fg-muted);
      margin-top: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    /* ===== Score chip. Zelfde heat-gradient als de Score-widget. ===== */
    .chip {
      display: inline-flex;
      align-items: baseline;
      gap: 7px;
      margin-top: 8px;
      padding: 5px 12px;
      border-radius: 999px;
      align-self: flex-start;
      color: #FFFFFF;
      font-weight: 800;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.25),
        inset 0 -1px 0 rgba(0,0,0,0.15),
        0 2px 5px rgba(0,0,0,0.18);
      transition: background 0.5s ease;
    }
    .chip-hot  { background: linear-gradient(145deg, #FFB347 0%, #D85A30 60%, #A93F14 100%); }
    .chip-warm { background: linear-gradient(145deg, #FFD54F 0%, #F5A623 60%, #B87A00 100%); }
    .chip-cool { background: linear-gradient(145deg, #7A8FA8 0%, #4A5E78 60%, #2C3D52 100%); }
    .chip-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.85;
    }
    .chip-value {
      font-size: 17px;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 1px 1px rgba(0,0,0,0.15);
      line-height: 1;
    }

    /* ===== Weather line onderaan ===== */
    .weather-line {
      grid-column: 1 / -1;
      padding-top: 10px;
      margin-top: 8px;
      border-top: 1px solid var(--border);
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
      color: var(--fg);
      letter-spacing: -0.005em;
    }
    .weather-line.hidden { display: none; }
    .weather-line .dot {
      opacity: 0.55;
      font-weight: 900;
      margin: 0 6px;
    }
  </style>
</head>
<body class="homey-widget">
  <div class="card">
    <div class="scene" id="scene">
      <img class="weather" id="weatherImg" src="assets/weather-sunny.svg" alt="" />
      <img class="kettle" src="assets/kettle.svg" alt="" />
      <div class="flame-wrap" id="flameWrap">
        <img class="flame" id="flameImg" src="assets/flame.svg" alt="" />
      </div>
    </div>
    <div class="content">
      <div class="verdict" id="verdict">—</div>
      <div class="advice" id="advice">…</div>
      <div class="chip" id="chip" style="display:none">
        <span class="chip-label" id="chipLabel">Score</span>
        <span class="chip-value" id="chipValue">0</span>
      </div>
    </div>
    <div class="weather-line" id="weather">—</div>
  </div>

  <script>
    // ============ Weer-glyph kiezer (bepaalt welke weer-SVG bovenop ligt) ============
    // Houdt rekening met de status: een goede BBQ-dag toont standaard de zon,
    // tenzij het echt overcast is. Open-Meteo's cloudCover is vaak hoog door
    // hoge cirrus, dus we hanteren een strengere drempel.
    function pickWeather(d) {
      const rain   = d.rain       ?? 0;
      const wind   = d.windSpeed  ?? 0;
      const gusts  = d.windGusts  ?? wind;
      const temp   = d.temperature ?? 20;
      const cloud  = d.cloudCover ?? 0;
      const status = d.status;

      // Knock-outs (slecht weer wint altijd).
      if (temp <= 1 && rain > 0.1)   return 'snow';
      if (rain > 1.5 && gusts > 50)  return 'storm';
      if (rain > 0.4)                return 'rain';
      if (gusts > 50 || wind > 40)   return 'wind';

      // Op een ja-dag de zon tonen, tenzij het echt dik bewolkt is.
      if (status === 'yes' && cloud < 90) return 'sunny';

      // Anders: bewolkt bij stevige bewolking, anders de zon als standaard.
      if (cloud > 75) return 'cloudy';
      return 'sunny';
    }

    // ============ Score naar chip-kleurbucket ============
    function scoreBucket(score) {
      if (score == null) return 'chip-warm';
      if (score >= 70)  return 'chip-hot';
      if (score >= 40)  return 'chip-warm';
      return 'chip-cool';
    }

    // ============ Wind- en regen-tekstbuckets (strings komen uit /i18n) ============
    function windKey(kmh) {
      if (kmh == null) return null;
      if (kmh < 12) return 'light';
      if (kmh < 25) return 'moderate';
      if (kmh < 35) return 'strong';
      if (kmh < 50) return 'hard';
      return 'gale';
    }
    function rainKey(mm) {
      if (mm == null) return null;
      if (mm <= 0.1) return 'dry';
      if (mm < 0.5)  return 'barelyWet';
      if (mm < 1)    return 'lightShower';
      if (mm < 2)    return 'showerExpected';
      return 'heavyRain';
    }
    // Geeft een array DOM-nodes terug (tekst afgewisseld met .dot spans) voor veilige invoeging.
    function buildWeatherNodes(data, L) {
      const parts = [];
      if (data.temperature != null) parts.push(Math.round(data.temperature) + '°');
      const wk = windKey(data.windSpeed); if (wk) parts.push(L.wind[wk]);
      const rk = rainKey(data.rain);      if (rk) parts.push(L.rain[rk]);
      if (parts.length === 0) return [document.createTextNode('—')];
      const nodes = [];
      parts.forEach((p, i) => {
        if (i > 0) {
          const dot = document.createElement('span');
          dot.className = 'dot';
          dot.textContent = '·';
          nodes.push(dot);
        }
        nodes.push(document.createTextNode(p));
      });
      return nodes;
    }

    function onHomeyReady(Homey) {
      Homey.ready({ height: 220 });
      const settings = Homey.getSettings();
      const showDetails = settings.show_details !== false;
      if (!showDetails) document.getElementById('weather').classList.add('hidden');

      let L = null;
      let refreshing = false;
      const weatherImg = document.getElementById('weatherImg');

      async function refresh() {
        if (refreshing) return;
        refreshing = true;
        try {
          if (!L) L = await Homey.api('GET', '/i18n');
          if (!L) return;

          if (document.getElementById('advice').textContent === '…') {
            document.getElementById('advice').textContent = L.loading;
          }

          const data = await Homey.api('GET', '/status');
          if (!data || data.error) return;

          const s = data.status || 'maybe';
          document.body.className = 'homey-widget ' + s;

          // De vlam schaalt mee met de score, in een bereik van 0.5 tot 1.1.
          // Score 100 geeft een grote vlam; score 40 een kleine, bescheiden vlam.
          const sc = Math.max(0, Math.min(100, data.score ?? 0));
          const flameScale = (0.5 + (sc / 100) * 0.6).toFixed(2);
          document.documentElement.style.setProperty('--flame-scale', flameScale);

          // Wissel de weer-glyph (zon, wolk, regen, storm, wind, sneeuw).
          const wk = pickWeather(data);
          const nextSrc = 'assets/weather-' + wk + '.svg';
          if (!weatherImg.src.endsWith(nextSrc)) weatherImg.src = nextSrc;

          document.getElementById('verdict').textContent = L.verdicts[s] || L.verdicts.maybe;
          document.getElementById('advice').textContent = data.advice || '';

          const chip = document.getElementById('chip');
          if (data.score != null) {
            chip.style.display = 'inline-flex';
            chip.className = 'chip ' + scoreBucket(data.score);
            document.getElementById('chipLabel').textContent = L.score;
            document.getElementById('chipValue').textContent = data.score;
          }

          const wLine = document.getElementById('weather');
          wLine.replaceChildren(...buildWeatherNodes(data, L));
        } catch (e) { console.error(e); }
        finally { refreshing = false; }
      }

      refresh();
      // Lifecycle: interval-id bewaren en stoppen bij iframe-unload.
      const refreshTimer = setInterval(refresh, 5 * 60 * 1000);
      const cleanup = () => clearInterval(refreshTimer);
      window.addEventListener('pagehide', cleanup);
      window.addEventListener('beforeunload', cleanup);
    }
  </script>
</body>
</html>
